apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: review-rating-service
  namespace: {{ .Values.namespace }}
spec:
  serviceName: review-rating-service
  replicas: {{ .Values.reviewRatingService.replicas }}
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: review-rating-service
  template:
    metadata:
      labels:
        app: review-rating-service
    spec:
      initContainers:
      - name: wait-for-mongodb
        image: busybox:1.36
        command: ['sh', '-c', 'echo "Waiting for MongoDB..."; until nc -z mongodb 27017; do sleep 2; done; echo "MongoDB is ready!"']
      containers:
      - name: review-rating-service
        image: {{ .Values.reviewRatingService.image.repository }}:{{ .Values.reviewRatingService.image.tag }}
        ports:
        - containerPort: 3012
        env:
        - name: PORT
          value: '3012'
        - name: PRODUCT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: clahanstore-config
              key: PRODUCT_SERVICE_URL
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: clahanstore-secrets
              key: MONGO_URI_REVIEW
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3012
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3012
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
