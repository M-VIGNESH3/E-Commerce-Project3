apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-blue-green
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/M-VIGNESH3/E-Commerce-Project.git'
    targetRevision: feature/argo-blue-green
    path: argo-deployments
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: clahanstore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
